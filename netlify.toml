[build]
  publish = "public"

[[redirects]]
  from = "/*"
  to = "/dashboard.html"
  status = 200
  conditions = {Role = ["authenticated"]}

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
